import json
import os
from datetime import datetime


def fetch_events(limit=1000):
    """
    Firebase-shaped local event store (no external dependency yet).

    Later this will be swapped 1:1 with Firebase Firestore.
    """

    path = os.path.join(
        os.path.dirname(__file__),
        "local_events.json"
    )

    if not os.path.exists(path):
        return []

    with open(path, "r") as f:
        data = json.load(f)

    # enforce schema consistency (like Firebase would)
    events = []
    for e in data[:limit]:
        events.append({
            "user_id": e.get("user_id"),
            "event_name": e.get("event_name"),
            "timestamp": e.get("timestamp"),
            "properties": e.get("properties", {})
        })

    return events